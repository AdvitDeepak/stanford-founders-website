<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact — Stanford Founders</title>
    <link rel="stylesheet" href="static/css/styles.css">
    <link rel="icon" href="images/logos/logo-150.png" sizes="32x32">
    <style>
        .form-control {
            background-color: rgba(0, 0, 0, 0.3) !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            color: var(--color-white) !important;
        }
        .form-control:focus {
            background-color: rgba(0, 0, 0, 0.4) !important;
            border-color: var(--color-cardinal) !important;
            outline: none;
        }
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        .form-label {
            color: var(--color-white) !important;
        }
    </style>
    <script src="static/js/components.js"></script>
    <script>
        async function handleFormSubmit(e) {
            e.preventDefault();
            const form = e.target;
            const submitBtn = form.querySelector('button[type="submit"]');
            const originalText = submitBtn.textContent;
            
            submitBtn.textContent = 'Sending...';
            submitBtn.disabled = true;
            
            const formData = {
                firstName: form.firstName.value,
                lastName: form.lastName.value,
                email: form.email.value,
                message: form.message.value
            };
            
            try {
                const params = new URLSearchParams(formData);
                const response = await fetch('https://script.google.com/macros/s/AKfycbwXJcHdKMc2tqan-EB0M_MIHWRmNrghI8qbAWoS2syckAGLValMl0Y8r60lF1bQ0efP/exec?' + params);
                
                if (response.ok) {
                    submitBtn.textContent = 'Sent!';
                    submitBtn.style.backgroundColor = 'var(--color-success, #28a745)';
                    form.reset();
                    setTimeout(() => {
                        submitBtn.textContent = originalText;
                        submitBtn.style.backgroundColor = '';
                        submitBtn.disabled = false;
                    }, 3000);
                } else {
                    throw new Error('Submission failed');
                }
            } catch (error) {
                submitBtn.textContent = 'Error - Try Again';
                submitBtn.disabled = false;
                setTimeout(() => {
                    submitBtn.textContent = originalText;
                }, 3000);
            }
        }
    </script>
</head>
<body style="background-image: linear-gradient(to bottom, rgba(17,17,17,0.7), rgba(17,17,17,0.95)), url('images/backgrounds/campus-night.jpeg'); background-size: cover; background-position: center; background-attachment: fixed; color: var(--color-parchment);">
    <div id="header-placeholder"></div>

    <main>
        <section class="section">
            <div class="container hero-content text-center" style="margin: 0 auto; max-width: 800px;">
                <div
                    style="display: inline-block; background-color: rgba(255,255,255,0.1); color: var(--color-white); font-weight: 600; font-size: 0.875rem; padding: 6px 16px; border-radius: 100px; margin-bottom: var(--space-sm); border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(4px);">
                    Connect with SFS
                </div>
                <h1 style="color: var(--color-white); font-size: clamp(2.5rem, 5vw, 4rem); letter-spacing: -0.03em;">Reach Out and Collaborate With Us</h1>
            </div>
        </section>

        <section class="section-tight glass-dark" style="padding-bottom: var(--space-xl); border-radius: var(--radius-xl); margin-top: var(--space-md);">
            <div class="container">
                <div class="grid grid-2" style="align-items: flex-start; gap: var(--space-xl);">
                    <!-- Contact Form -->
                    <div class="card glass-card" style="border: 1px solid rgba(255,255,255,0.1);">
                        <form onsubmit="handleFormSubmit(event)">
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-sm); margin-bottom: var(--space-sm);">
                                <div class="form-group">
                                    <label class="form-label" for="firstName">First Name <span style="color: var(--color-cardinal);">*</span></label>
                                    <input type="text" id="firstName" name="firstName" class="form-control" required>
                                </div>
                                <div class="form-group">
                                    <label class="form-label" for="lastName">Last Name <span style="color: var(--color-cardinal);">*</span></label>
                                    <input type="text" id="lastName" name="lastName" class="form-control" required>
                                </div>
                            </div>
                            
                            <div class="form-group">
                                <label class="form-label" for="email">Email <span style="color: var(--color-cardinal);">*</span></label>
                                <input type="email" id="email" name="email" class="form-control" required>
                            </div>
                            
                            <div class="form-group">
                                <label class="form-label" for="message">Message <span style="color: var(--color-cardinal);">*</span></label>
                                <textarea id="message" name="message" class="form-control" rows="5" required></textarea>
                            </div>
                            
                            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: var(--space-sm);">Submit</button>
                        </form>
                    </div>

                    <!-- Contact Details -->
                    <div style="padding-top: var(--space-md);">
                        <div
                            style="display: inline-block; background-color: rgba(255,255,255,0.1); color: var(--color-white); font-weight: 600; font-size: 0.875rem; padding: 6px 16px; border-radius: 100px; margin-bottom: var(--space-sm); border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(4px);">
                            Get in Touch
                        </div>
                        <h2 style="color: var(--color-white);">We're Always Looking to Work Together</h2>
                        <p style="color: rgba(255,255,255,0.85); margin-top: var(--space-sm); margin-bottom: var(--space-sm); line-height: 1.6;">We've partnered with many organizations—from VCs to startups to other universities. Let's build something together.</p>
                        <div class="divider"></div>
                        
                        <div style="margin-top: var(--space-md);">
                            <h3 style="margin-bottom: var(--space-xs); color: var(--color-white);">Email</h3>
                            <p style="margin-bottom: 0; color: rgba(255,255,255,0.85);"><a href="mailto:jennyji@stanford.edu" style="color: var(--color-cardinal);">jennyji@stanford.edu</a></p>
                        </div>
                        
                        <div style="margin-top: var(--space-md);">
                            <h3 style="margin-bottom: var(--space-sm); color: var(--color-white);">Connect</h3>
                            <div class="flex items-center" style="gap: var(--space-md);">
                                <a href="https://www.linkedin.com/company/stanford-founders/" target="_blank" rel="noopener noreferrer" style="display: flex; align-items: center; gap: 8px; color: var(--color-white); font-weight: 600;">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                                        <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
                                    </svg>
                                    LinkedIn
                                </a>
                                
                                <a href="https://chat.whatsapp.com/KgV28MIIjml5BHEGT4T0dG" target="_blank" rel="noopener noreferrer" style="display: flex; align-items: center; gap: 8px; color: var(--color-white); font-weight: 600;">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                                        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.888-.788-1.489-1.761-1.663-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                                    </svg>
                                    WhatsApp
                                </a>

                                <a href="https://lu.ma/stanford-startup-events" target="_blank" rel="noopener noreferrer" style="display: flex; align-items: center; gap: 8px; color: var(--color-white); font-weight: 600;">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                                        <path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm0 18.2c-3.418 0-6.2-2.782-6.2-6.2S8.582 5.8 12 5.8s6.2 2.782 6.2 6.2-2.782 6.2-6.2 6.2z"/>
                                        <path d="M12 8.6c-1.875 0-3.4 1.525-3.4 3.4 0 1.875 1.525 3.4 3.4 3.4s3.4-1.525 3.4-3.4c0-1.875-1.525-3.4-3.4-3.4z"/>
                                    </svg>
                                    Luma
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>
</body>
</html>
